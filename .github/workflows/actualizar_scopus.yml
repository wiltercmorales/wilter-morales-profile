name: Actualizar publicaciones Scopus

on:
  schedule:
    - cron: '0 8 1 * *'   # Día 1 de cada mes a las 8:00 UTC
  workflow_dispatch:        # Ejecución manual desde GitHub → Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Ejecutar actualizador Scopus
        env:
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
        run: python update_pubs.py

      - name: Publicar cambios si hay nuevos artículos
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: actualizar publicaciones desde Scopus"
          file_pattern: index.html
